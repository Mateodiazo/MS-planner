# MS Planner — servidor estático endurecido.
# Imagen nginx-unprivileged: escucha en 8080 y corre como usuario no-root.

server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # === HEADERS DE SEGURIDAD ===
    add_header X-Frame-Options        "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection        "1; mode=block" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # Content Security Policy.
    #  · style-src incluye 'unsafe-inline' PORQUE la app usa atributos style="…"
    #    y estilos generados dinámicamente en JS (quitarlos sería otro refactor).
    #  · script-src 'self'  → ESTRICTO (Fase 3 COMPLETA): los ~282 onclick inline se
    #    migraron a event delegation y se eliminó todo eval/new Function, así que ya
    #    no hay scripts ni handlers inline (salvo el anti-flash, cubierto por su hash).
    # script-src 'self' + hash del ÚNICO script inline (anti-flash de tema del <head>).
    # Si cambias ese script, recalcula el sha256 y actualiza aquí Y en el <meta> del HTML.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'sha256-UfVhTPI0nw4o9KiJAYDT2WQiGMdj+eSVv7p3da/qru4='; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.supabase.co; connect-src 'self' https://*.supabase.co wss://*.supabase.co; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;

    # HSTS: descomenta SOLO cuando sirvas por HTTPS.
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # SPA: todo a index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache corto de estáticos (CSS/JS)
    location ~* \.(css|js)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # Bloquear archivos sensibles servidos por error
    location ~* \.(sql|md|env|yml|yaml|json|dockerfile)$ { deny all; return 404; }
    # Bloquear carpetas ocultas (.git, .env…)
    location ~ /\.            { deny all; return 404; }

    autoindex off;
    client_max_body_size 1m;
}
