<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MS Planner · Administración de Congregación</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%237c3aed'/%3E%3Cstop offset='1' stop-color='%234c1d95'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='48' height='48' rx='12' fill='url(%23g)'/%3E%3Ccircle cx='24' cy='24' r='15' fill='none' stroke='%23a78bfa' stroke-width='2' opacity='.55'/%3E%3Ctext x='24' y='30' font-family='Arial' font-size='18' font-weight='800' fill='white' text-anchor='middle'%3EMS%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script>(function(){try{var t=localStorage.getItem('msp_theme');if(!t)t=(window.matchMedia&&matchMedia('(prefers-color-scheme:dark)').matches)?'dark':'light';if(t==='dark')document.documentElement.setAttribute('data-theme','dark');}catch(e){}})();</script>
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/components.css">
</head>
<body>
<div class="app" style="visibility:hidden">
  <aside class="sidebar" id="sidebar">
    <div class="brand"><div class="brand-logo" id="brandLogo"></div><div class="brand-name">MS<span>PLANNER</span></div></div>
    <nav class="nav" id="nav"></nav>
    <div class="sidebar-foot">
      <div class="cong-switch" role="button" tabindex="0" aria-label="Abrir configuración de la congregación" data-click="go" data-click-args='["config"]' data-keydown="kbdActivate" data-tip="Configuración de la congregación">
        <div class="cong-avatar">LF</div>
        <div class="cong-text"><b>Congregación Las Flores</b><small>Circuito Bogotá · Activa</small></div>
        <div class="cong-cog"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.6 1.6 0 00.3 1.8l.1.1a2 2 0 11-2.8 2.8l-.1-.1a1.6 1.6 0 00-2.7 1.1V21a2 2 0 01-4 0v-.2a1.6 1.6 0 00-2.7-1.1l-.1.1a2 2 0 11-2.8-2.8l.1-.1A1.6 1.6 0 004.6 15H4a2 2 0 010-4h.2a1.6 1.6 0 001.1-2.7l-.1-.1a2 2 0 112.8-2.8l.1.1A1.6 1.6 0 0011 4.6V4a2 2 0 014 0v.2a1.6 1.6 0 002.7 1.1l.1-.1a2 2 0 112.8 2.8l-.1.1A1.6 1.6 0 0021 11h.2a2 2 0 010 4H21z"/></svg></div>
      </div>
    </div>
  </aside>
  <div class="scrim" id="scrim" data-click="closeMobileNav"></div>
  <div class="main">
    <header class="header">
      <button class="icon-btn menu-toggle" data-click="openMobileNav"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 12h18M3 6h18M3 18h18"/></svg></button>
      <button class="icon-btn" data-click="toggleSidebar" data-tip="Colapsar menú"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 3v18M4 5h16a1 1 0 011 1v12a1 1 0 01-1 1H4a1 1 0 01-1-1V6a1 1 0 011-1z"/></svg></button>
      <div class="breadcrumbs" id="breadcrumbs"></div>
      <div class="search" data-click="focusGlobalSearch">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="globalSearch" placeholder="Buscar publicadores, territorios, tareas…" autocomplete="off"/><kbd>⌘K</kbd>
      </div>
      <button class="icon-btn" id="themeToggle" data-click="toggleTheme" data-tip="Modo oscuro" aria-label="Cambiar a modo oscuro"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1111.2 3a7 7 0 009.8 9.8z"/></svg></button>
      <button class="icon-btn" id="notifBtn" data-tip="Notificaciones" data-click="toggleNotif" data-click-args='["$event"]'><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M18 8a6 6 0 00-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 01-3.4 0"/></svg><span class="dot"></span></button>
      <div class="header-divider"></div>
      <div class="profile-chip" id="profileBtn" data-click="toggleProfile" data-click-args='["$event"]'>
        <div class="avatar">PD</div><div class="profile-meta"><b>Paublo Díaz</b><small>Anciano · Coordinador</small></div>
        <div class="chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="m6 9 6 6 6-6"/></svg></div>
      </div>
    </header>
    <div class="content" id="content"></div>
  </div>
</div>
<div class="toast-wrap" id="toastWrap"></div>
<script type="module" src="js/icons.js"></script>
<script type="module" src="js/dom.js"></script>
<script type="module" src="js/seed.js"></script>
<script type="module" src="js/constants.js"></script>
<script type="module" src="js/data.js"></script>
<script type="module" src="js/exports.js"></script>
<script type="module" src="js/app.js"></script>
</body>
</html>
